services:
  app:
    build:
      context: .
    container_name: vm-git-lab-app
    expose:
      - "8080"
    networks:
      - my-network

  proxy:
    image: nginx:alpine
    container_name: vm-git-lab-proxy
    ports:
      - "8080:80"
    depends_on:
      - app
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - my-network

networks:
  my-network:
    driver: bridge
