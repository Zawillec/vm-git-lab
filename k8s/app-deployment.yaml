apiVersion: apps/v1
kind: Deployment
metadata:
  name: vm-git-lab-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: vm-git-lab-app
  template:
    metadata:
      labels:
        app: vm-git-lab-app
    spec:
      containers:
        - name: app
          image: vm-git-lab-app:1.0
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 2
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
